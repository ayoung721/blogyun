<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 개발 블로그</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
body {
  margin: 0;
  font-family: 'Pretendard', sans-serif;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #020617, #1e293b);
  background-size: 400% 400%;
  animation: bgMove 12s ease infinite;
  color: #e2e8f0;
  overflow-x: hidden;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px;
}

/* 타이핑 효과 */
.typing {
  font-size: 2.5rem;
  text-align: center;
  border-right: 3px solid;
  width: 0;
  white-space: nowrap;
  overflow: hidden;
  animation: typing 2s steps(20) forwards, blink .7s infinite;
}

@keyframes typing {
  to { width: 100%; }
}
@keyframes blink {
  50% { border-color: transparent; }
}

/* 카드 */
.card {
  background: rgba(30,41,59,0.7);
  backdrop-filter: blur(12px);
  padding: 25px;
  margin-bottom: 25px;
  border-radius: 16px;
  transition: all 0.3s ease;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);

  opacity: 0;
  transform: translateY(40px);
}

/* hover 효과 */
.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(56,189,248,0.6);
  background: rgba(51,65,85,0.9);
}

/* 스크롤 등장 */
.show {
  opacity: 1;
  transform: translateY(0);
  transition: 0.6s ease;
}

a {
  text-decoration: none;
  color: inherit;
  display: block;
}

.card h2 {
  margin-bottom: 10px;
}

.card p {
  color: #cbd5f5;
  margin: 0;
}

.nav-buttons {
  text-align: center;
  margin-top: 2rem;
}
.btn {
  display: inline-flex;
  padding: 0.8rem 2.5rem;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 50px;
  transition: all 0.3s;
}
.btn:hover {
  background: #38bdf8;
  border-color: #38bdf8;
  color: #fff;
}
</style>
</head>

<body>

<div class="container">
  <h1 class="typing">🚀 나의 개발 블로그</h1>

  <a href="post1.html">
    <div class="card">
      <h2>🐍 파이썬 학습 경험과 느낀 점</h2>
      <p>파이썬을 배우며 느낀 점과 학습 과정 정리</p>
    </div>
  </a>

  <a href="post2.html">
    <div class="card">
      <h2>💻 C언어 수업 경험 및 어려웠던 점</h2>
      <p>C언어 학습 과정과 어려웠던 부분 정리</p>
    </div>
  </a>

  <a href="post3.html">
    <div class="card">
      <h2>🤖 AI Agent를 활용한 블로그 제작 과정</h2>
      <p>AI를 활용하여 블로그를 만든 과정 정리</p>
    </div>
  </a>
  
  <div class="nav-buttons">
    <a class="btn" href="index.html" style="display:inline-block;">홈으로</a>
  </div>
</div>

<script>
// 처음 접속 시 순차적으로 카드 띄우기
const cards = document.querySelectorAll('.card');
setTimeout(() => {
  cards.forEach((card, index) => {
    setTimeout(() => {
      card.classList.add('show');
    }, index * 200);
  });
}, 500); 

// 스크롤 이벤트 백업 (만약을 위해 유지)
window.addEventListener('scroll', () => {
  cards.forEach(card => {
    const rect = card.getBoundingClientRect();
    if (rect.top < window.innerHeight - 50) {
      card.classList.add('show');
    }
  });
});
</script>

</body>
</html>
