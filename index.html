<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>윤아영 블로그</title>
<meta name="description" content="컴퓨터 소프트웨어 공학도의 기술 블로그입니다.">

<!-- Pretendard 폰트 추가 (CSS에서 사용 설정됨) -->
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<style>
body {
  margin: 0;
  font-family: 'Pretendard', sans-serif;
  background-color: #0f172a;
  color: #e2e8f0;
}

/* 전체 컨테이너 */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 20px;
}

/* 제목 */
h1 {
  text-align: center;
  font-size: 2.5rem;
  margin-bottom: 40px;
  font-weight: 700;
}

/* 카드 */
.card {
  background: #1e293b;
  padding: 25px;
  margin-bottom: 20px;
  border-radius: 16px;
  transition: all 0.3s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* hover 효과 */
.card:hover {
  transform: translateY(-5px);
  background: #334155;
}

/* 제목 */
.card h2 {
  margin-top: 0;
  font-size: 1.5rem;
}

/* 본문 */
.card p {
  line-height: 1.6;
  color: #cbd5f5;
}

/* 링크 */
a {
  text-decoration: none;
  color: inherit;
}
</style>
</head>

<body>

<div class="container">
  <h1>윤아영 블로그</h1>

  <a href="about.html">
    <div class="card">
      <h2>About Me</h2>
      <p>제 소개와 관심사를 확인하실 수 있는 페이지입니다.</p>
    </div>
  </a>

  <a href="blog.html">
    <div class="card">
      <h2>Blog</h2>
      <p>파이썬, C언어 학습 경험과 AI Agent를 활용한 블로그 제작 과정을 확인해보세요.</p>
    </div>
  </a>
</div>

</body>
</html>
