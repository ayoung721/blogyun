<style>
body {
  margin: 0;
  font-family: 'Pretendard', sans-serif;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #020617, #1e293b);
  background-size: 400% 400%;
  animation: bgMove 12s ease infinite;
  color: #e2e8f0;
}

@keyframes bgMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 40px 20px;
  animation: fadeUp 0.8s ease;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

a {
  color: #38bdf8;
  text-decoration: none;
}

h1 {
  margin-bottom: 20px;
}

p {
  line-height: 1.7;
  margin-bottom: 15px;
}
</style>
</head>

<div class="container">

<h1>AI Agent를 활용한 블로그 제작 과정</h1>

<p><b>1. 사용한 AI</b><br>
ChatGPT(OpenAI)를 활용하여 블로그를 제작하였다.</p>

<p><b>2. 활용 내용</b><br>
HTML, CSS 코드 작성과 글 내용 정리에 활용하였다.</p>

<p><b>3. 프롬프트</b><br>
“블로그를 만들어줘”, “디자인을 고급스럽게 해줘” 등의 명령을 사용하였다.</p>

<p><b>4. 느낀 점</b><br>
AI를 활용하면 개발 속도가 매우 빨라지고 효율적이라는 것을 느꼈다.</p>
